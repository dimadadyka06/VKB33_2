<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Управление расписанием{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f5f7fa; color: #333; }

        header {
            background: #2c3e50;
            color: white;
            padding: 16px 32px;
        }
        header h1 { font-size: 1.5rem; letter-spacing: 1px; }
        header a { color: #ecf0f1; text-decoration: none; }

        nav {
            background: #34495e;
            padding: 0 32px;
        }
        nav ul {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 0;
        }
        nav ul li a {
            display: block;
            color: #ecf0f1;
            text-decoration: none;
            padding: 14px 20px;
            font-size: 0.95rem;
            transition: background 0.2s;
        }
        nav ul li a:hover {
            background: #2c3e50;
            color: #f39c12;
        }

        main {
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 20px;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #2c3e50;
            color: #95a5a6;
            font-size: 0.85rem;
            margin-top: 60px;
        }

        .btn { display: inline-block; padding: 6px 14px; border-radius: 4px; text-decoration: none; font-size: 0.9rem; cursor: pointer; border: none; }
        .btn-edit   { background: #f39c12; color: #fff; }
        .btn-delete { background: #e74c3c; color: #fff; }
        .btn-add    { background: #27ae60; color: #fff; }
        .btn-back   { background: #7f8c8d; color: #fff; }
        .btn:hover  { opacity: 0.85; }

        table { border-collapse: collapse; width: 100%; background: #fff; border-radius: 6px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #ddd; padding: 10px 14px; text-align: left; }
        th { background: #ecf0f1; font-weight: 600; }
        tr:hover td { background: #f9f9f9; }

        .alert-empty { background: #fef3cd; padding: 14px 20px; border-left: 4px solid #f39c12; border-radius: 4px; margin: 20px 0; }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 4px; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem;
        }
        .form-group .helptext { font-size: 0.82rem; color: #7f8c8d; margin-top: 3px; }
        .errorlist { color: #e74c3c; font-size: 0.85rem; margin-top: 4px; padding-left: 16px; }
        .form-card { background: #fff; padding: 28px 32px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); max-width: 600px; }
        .form-card h2 { margin-bottom: 20px; }
    </style>
</head>
<body>

    <header>
        <h1><a href="{% url 'schedule_index' %}">📅 Управление расписанием</a></h1>
    </header>

    <nav>
        <ul>
            <li><a href="{% url 'teacher_list' %}">Список преподавателей</a></li>
            <li><a href="{% url 'teacher_create' %}">Добавить преподавателя</a></li>
            <li><a href="{% url 'schedule_course_list' %}">Список курсов</a></li>
            <li><a href="{% url 'course_create' %}">Добавить курс</a></li>
            <li><a href="{% url 'student_list' %}">Студенты</a></li>
            <li><a href="/">На главный сайт</a></li>
        </ul>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>&copy; 2025 Система управления расписанием</p>
    </footer>

</body>
</html>
