<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Каталог курсов{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f5f7fa; color: #333; }

        header {
            background: #1a252f;
            color: white;
            padding: 16px 32px;
        }
        header h1 { font-size: 1.5rem; letter-spacing: 1px; }
        header a { color: #ecf0f1; text-decoration: none; }

        nav {
            background: #2c3e50;
            padding: 0 32px;
        }
        nav ul {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
        }
        nav ul li a {
            display: block;
            color: #ecf0f1;
            text-decoration: none;
            padding: 14px 20px;
            font-size: 0.95rem;
            transition: background 0.2s;
        }
        nav ul li a:hover, nav ul li a.active {
            background: #1a252f;
            color: #f39c12;
        }

        main {
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 20px;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #1a252f;
            color: #7f8c8d;
            font-size: 0.85rem;
            margin-top: 60px;
        }

        /* Карточки */
        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.1);
            padding: 22px 26px;
            margin-bottom: 18px;
            transition: box-shadow 0.2s;
        }
        .card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.13); }
        .card h3 { margin-bottom: 10px; font-size: 1.15rem; }
        .card h3 a { color: #2c3e50; text-decoration: none; }
        .card h3 a:hover { color: #e67e22; }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        /* Бейджи */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
        }
        .badge-beginner    { background: #d5f5e3; color: #1e8449; }
        .badge-intermediate{ background: #fdebd0; color: #d35400; }
        .badge-advanced    { background: #fadbd8; color: #c0392b; }

        /* Мета-строка */
        .meta { color: #7f8c8d; font-size: 0.88rem; margin: 5px 0; }
        .meta strong { color: #555; }

        /* Кнопки */
        .btn {
            display: inline-block;
            padding: 7px 16px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background: #2980b9; color: #fff; }
        .btn-back    { background: #7f8c8d; color: #fff; }
        .btn-manage  { background: #8e44ad; color: #fff; }

        /* Пустое состояние */
        .alert-empty {
            background: #fef9e7;
            padding: 16px 20px;
            border-left: 4px solid #f39c12;
            border-radius: 4px;
            margin: 20px 0;
        }

        /* Страница детали */
        .detail-block {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.1);
            padding: 28px 32px;
            max-width: 760px;
        }
        .detail-block h2 { margin: 22px 0 10px; font-size: 1.1rem; color: #2c3e50; border-bottom: 1px solid #eee; padding-bottom: 6px; }
        .detail-row { display: flex; gap: 10px; margin-bottom: 8px; }
        .detail-row .label { min-width: 160px; font-weight: 600; color: #555; }

        /* Статистика (главная) */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 18px;
            margin: 28px 0;
        }
        .stat-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.1);
            padding: 24px 20px;
            text-align: center;
        }
        .stat-card .num { font-size: 2.2rem; font-weight: 700; color: #2c3e50; }
        .stat-card .lbl { font-size: 0.88rem; color: #7f8c8d; margin-top: 4px; }

        /* 404 */
        .not-found-box { text-align: center; padding: 60px 20px; }
        .not-found-box .code { font-size: 6rem; font-weight: 700; color: #e0e0e0; line-height: 1; }
        .not-found-box p { color: #7f8c8d; margin: 14px 0 24px; }

        h2.page-title { font-size: 1.6rem; margin-bottom: 22px; color: #2c3e50; }
    </style>
</head>
<body>

<header>
    <h1><a href="/">📚 Каталог курсов</a></h1>
</header>

<nav>
    <ul>
        <li><a href="/">Главная</a></li>
        <li><a href="/courses/">Курсы</a></li>
        <li><a href="/authors/">Преподаватели</a></li>
        <li><a href="/info/">О сайте</a></li>
        <li><a href="/schedule/">⚙ Управление</a></li>
    </ul>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    <p>&copy; 2025 Каталог курсов</p>
</footer>

</body>
</html>
