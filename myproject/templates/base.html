<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Мой сайт{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="{% url 'home' %}">🏠 Социалка</a>
        </div>
        <div class="nav-links">
            {% if user.is_authenticated %}
                <a href="{% url 'user_list' %}" class="nav-link">👥 Пользователи</a>
                <a href="{% url 'incoming_requests' %}" class="nav-link">📩 Заявки</a>
                <a href="{% url 'profile' username=user.username %}" class="nav-link">👤 {{ user.username }}</a>
                <a href="{% url 'password_change' %}" class="btn btn-outline">🔑 Пароль</a>
                <form method="post" action="{% url 'logout' %}" style="display:inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Выйти</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-outline">Войти</a>
                <a href="{% url 'register' %}" class="btn btn-primary">Регистрация</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
